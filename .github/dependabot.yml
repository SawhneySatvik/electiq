version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      types:
        patterns:
          - "@types/*"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "happy-dom"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
